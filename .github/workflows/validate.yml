name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: conventions (tos validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validator
        run: ./ops/validate.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Lint ops scripts
        # --severity=warning: fail on real problems (warnings + errors),
        # not advisory info/style notes (e.g. SC1091 can't-follow-source,
        # which is a false positive when scripts source a sibling _lib.sh).
        run: shellcheck -x --severity=warning ops/*.sh ops/git-hooks/pre-commit

  e2e:
    name: two-member simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run end-to-end test
        run: ./ops/test-e2e.sh

  # Optional: full-history secret scan. Teams that copied the template may
  # delete this job (the pre-commit hook already scans staged changes when
  # gitleaks is installed locally).
  gitleaks:
    name: secret scan (optional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
